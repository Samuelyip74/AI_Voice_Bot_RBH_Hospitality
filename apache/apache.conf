ServerRoot "/usr/local/apache2"
ServerName ddns.net

LoadModule unixd_module modules/mod_unixd.so
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule alias_module modules/mod_alias.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so

User daemon
Group daemon

ErrorLog /proc/self/fd/2
LogLevel info

Listen 80
Listen 443

<VirtualHost *:80>
    ServerName ddns.net
    ServerAlias extcp.ddns.net

    # Let’s Encrypt challenge
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory "/var/www/certbot/.well-known/acme-challenge/">
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

AddType application/javascript .js
AddType text/css .css
AddType application/json .json
AddType application/javascript .mjs

<VirtualHost *:443>
    ServerName ddns.net
    ServerAlias extcp.ddns.net

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/certs/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/certs/server.key

    DocumentRoot "/usr/local/apache2/htdocs"
    DirectoryIndex index.html

    <Directory "/usr/local/apache2/htdocs">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Captive portal
    ProxyPass /portal http://api:8000/portal
    ProxyPassReverse /portal http://api:8000/portal

    ProxyPass /static http://api:8000/static
    ProxyPassReverse /static http://api:8000/static

    ProxyPass /radius http://api:8000/radius
    ProxyPassReverse /radius http://api:8000/radius

    ProxyPass /api http://api:8000/api
    ProxyPassReverse /api http://api:8000/api

    # SPA routing
    RewriteEngine On

    # Never rewrite backend routes
    RewriteCond %{REQUEST_URI} ^/(api|portal|static|radius)/ [NC]
    RewriteRule ^ - [L]

    # Never rewrite static frontend assets
    RewriteCond %{REQUEST_URI} \.(js|mjs|css|map|png|jpg|jpeg|gif|svg|ico)$ [NC]
    RewriteRule ^ - [L]

    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy *>
        Require all granted
    </Proxy>
</VirtualHost>

