[global]
type=global
user_agent=AIVoiceBot-Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Windows host LAN IP. This is the address SIP softphones should register to.
external_signaling_address=175.156.147.114
external_media_address=175.156.147.114
local_net=192.168.0.0/24

[transport-tls-rainbow]
type=transport
protocol=tls
bind=0.0.0.0:5061
method=tlsv1_2
verify_server=yes
verify_client=no
allow_wildcard_certs=yes
ca_list_file=/etc/asterisk/certs/certsip.pem
external_signaling_address=175.156.147.114
external_media_address=175.156.147.114
local_net=192.168.0.0/24

[endpoint-basic](!)
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw,slin16
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_address=192.168.0.58
dtmf_mode=rfc4733

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single-reg](!)
type=aor
max_contacts=1
remove_existing=yes

[1000](endpoint-basic)
auth=1000
aors=1000
callerid=Extension 1000 <1000>

[1000](auth-userpass)
username=1000
password=1000pass

[1000](aor-single-reg)

[1001](endpoint-basic)
auth=1001
aors=1001
callerid=Extension 1001 <1001>

[1001](auth-userpass)
username=1001
password=1001pass

[1001](aor-single-reg)

[rainbow-auth]
type=auth
auth_type=userpass
username=1900
password=uzvz*h*l#12

[rainbow-aor]
type=aor
contact=sip:313.apac1.sip.openrainbow.com:5061\;transport=tls
qualify_frequency=60

[rainbow-trunk]
type=endpoint
transport=transport-tls-rainbow
context=from-rainbow
disallow=all
allow=opus,g722,ulaw,alaw
outbound_auth=rainbow-auth
aors=rainbow-aor
from_user=1900
from_domain=313.apac1.sip.openrainbow.com
outbound_proxy=sip:lb01.apac1.sip.openrainbow.com:5061\;transport=tls\;lr
direct_media=no
media_encryption=sdes
media_encryption_optimistic=yes
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_address=175.156.147.114
dtmf_mode=rfc4733
rtp_keepalive=10
rtp_timeout=30

[rainbow-registration]
type=registration
transport=transport-tls-rainbow
outbound_auth=rainbow-auth
server_uri=sip:313.apac1.sip.openrainbow.com:5061\;transport=tls
client_uri=sip:1900@313.apac1.sip.openrainbow.com
contact_user=1900
outbound_proxy=sip:lb01.apac1.sip.openrainbow.com:5061\;transport=tls\;lr
retry_interval=60
forbidden_retry_interval=300
expiration=3600
line=yes
endpoint=rainbow-trunk

[rainbow-identify]
type=identify
endpoint=rainbow-trunk
match=313.apac1.sip.openrainbow.com
match=lb01.apac1.sip.openrainbow.com
