[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
TRANSFER_EXT=1001
RAINBOW_TRUNK=rainbow-trunk

[internal]
exten => 1000,1,NoOp(Dialing extension 1000)
 same => n,Dial(PJSIP/1000,30)
 same => n,Hangup()

exten => 1001,1,NoOp(Dialing extension 1001)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 5000,1,NoOp(AI voice assistant via EAGI)
 same => n,Answer()
 same => n,PlayTones(440+480/2000,0/4000)
 same => n,Wait(2)
 same => n,StopPlayTones()
 same => n,Set(AGISIGHUP=no)
 same => n,Set(AGIEXITONHANGUP=no)
 same => n,Set(EAGI_AUDIO_FORMAT=slin)
 same => n,Set(AI_CALLER_NAME=${CALLERID(name)})
 same => n,Set(AI_CALLER_NUM=${CALLERID(num)})
 same => n,Set(AI_SIP_FROM=${PJSIP_HEADER(read,From)})
 same => n,EAGI(voice_assistant_eagi.py)
 same => n,Hangup()

exten => 5020,1,NoOp(AI full-duplex concierge via ARI ExternalMedia slin24)
 same => n,Answer()
 same => n,PlayTones(440+480/2000,0/4000)
 same => n,Wait(4)
 same => n,StopPlayTones()
 same => n,Set(AI_CALLER_NAME=${CALLERID(name)})
 same => n,Set(AI_CALLER_NUM=${CALLERID(num)})
 same => n,Set(AI_SIP_FROM=${PJSIP_HEADER(read,From)})
 same => n,Stasis(ari_concierge)
 same => n,Hangup()

exten => 5022,1,NoOp(AI full-duplex concierge via legacy AudioSocket)
 same => n,Answer()
 same => n,PlayTones(440+480/2000,0/4000)
 same => n,Wait(1)
 same => n,StopPlayTones()
 same => n,Set(AGISIGHUP=no)
 same => n,Set(AGIEXITONHANGUP=no)
 same => n,Set(EAGI_AUDIO_FORMAT=slin)
 same => n,Set(AI_CALLER_NAME=${CALLERID(name)})
 same => n,Set(AI_CALLER_NUM=${CALLERID(num)})
 same => n,Set(AI_SIP_FROM=${PJSIP_HEADER(read,From)})
 same => n,EAGI(concierge_full_duplex_eagi.py)
 same => n,Hangup()

exten => 5010,1,NoOp(AI live translation bridge via AudioSocket)
 same => n,Answer()
 same => n,ExecIf($["${AUDIOSOCKET_UUID}" = ""]?Set(AUDIOSOCKET_UUID=${UUID()}))
 same => n,AudioSocket(${AUDIOSOCKET_UUID},127.0.0.1:9019)
 same => n,Hangup()

exten => 5012,1,NoOp(AI short-turn translation bridge via EAGI fallback)
 same => n,Answer()
 same => n,Set(AGISIGHUP=no)
 same => n,Set(AGIEXITONHANGUP=no)
 same => n,Set(EAGI_AUDIO_FORMAT=slin)
 same => n,EAGI(translation_bridge_eagi.py)
 same => n,Hangup()

exten => reclaim,1,NoOp(Reclaiming caller after failed transfer)
 same => n,Set(AGISIGHUP=no)
 same => n,Set(AGIEXITONHANGUP=no)
 same => n,Set(EAGI_AUDIO_FORMAT=slin)
 same => n,EAGI(voice_assistant_eagi.py,reclaimed)
 same => n,Hangup()

[ari-sip-transfer]
exten => refer,1,NoOp(SIP REFER transfer to ${AI_TRANSFER_TARGET})
 same => n,Transfer(${AI_TRANSFER_TARGET})
 same => n,NoOp(SIP REFER transfer status ${TRANSFERSTATUS} protocol ${TRANSFERSTATUSPROTOCOL})
 same => n,Hangup()

[internal]
exten => 6000,1,NoOp(Echo test for RTP troubleshooting)
 same => n,Answer()
 same => n,PlayTones(600/250,0/100,600/250)
 same => n,Wait(1)
 same => n,StopPlayTones()
 same => n,Echo()
 same => n,Hangup()

exten => _9X.,1,NoOp(Outbound call through Rainbow SIP/TLS trunk to ${EXTEN:1})
 same => n,Dial(PJSIP/${EXTEN:1}@${RAINBOW_TRUNK},60)
 same => n,Hangup()

[from-rainbow]
exten => 1900,1,NoOp(Inbound Rainbow trunk call for 1900 routed to AI assistant)
 same => n,Goto(internal,5020,1)

exten => s,1,NoOp(Inbound Rainbow trunk call without DID routed to AI assistant)
 same => n,Goto(internal,5020,1)
