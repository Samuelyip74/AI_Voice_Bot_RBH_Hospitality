services:
  apache:
    image: httpd:2.4
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apache/apache.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/certs:/usr/local/apache2/conf/certs:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./frontend/dist:/usr/local/apache2/htdocs
    depends_on:
      - api
    restart: unless-stopped

  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./frontend/dist:/app/dist
    command: sh -c "npm install && npm run build && cp index.html dist/index.html"
    profiles:
      - build

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  api:
    build: ./api
    env_file:
      - path: ./api/app/.env
        required: false
    ports:
      - "8000:8000"
    restart: unless-stopped

  asterisk:
    build:
      context: .
      dockerfile: Dockerfile
    image: aivoicebot-asterisk:latest
    container_name: aivoicebot-asterisk
    user: root
    restart: unless-stopped
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5060:5060/udp"
      - "5061:5061/tcp"
      - "20000-20099:20000-20099/udp"
    env_file:
      - ./agi/.env
    volumes:
      - ./asterisk/pjsip.conf.template:/etc/asterisk/pjsip.conf.template:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/certs:/etc/asterisk/certs:ro
      - ./agi:/var/lib/asterisk/agi-bin
      - ./logs:/var/log/asterisk/ai
      - asterisk_sounds_ai:/var/lib/asterisk/sounds/ai
    command: >
      sh -c "export ASTERISK_EXTERNAL_IP=$${ASTERISK_EXTERNAL_IP:-175.156.147.114};
             export ASTERISK_LAN_IP=$${ASTERISK_LAN_IP:-192.168.0.58};
             export ASTERISK_LOCAL_NET=$${ASTERISK_LOCAL_NET:-192.168.0.0/24};
             envsubst '$$ASTERISK_EXTERNAL_IP $$ASTERISK_LAN_IP $$ASTERISK_LOCAL_NET' < /etc/asterisk/pjsip.conf.template > /etc/asterisk/pjsip.conf;
             chmod +x /var/lib/asterisk/agi-bin/voice_assistant_eagi.py || true;
             chmod +x /var/lib/asterisk/agi-bin/translation_bridge_eagi.py || true;
             chmod +x /var/lib/asterisk/agi-bin/audiosocket_translation_server.py || true;
             chmod +x /var/lib/asterisk/agi-bin/concierge_full_duplex_eagi.py || true;
             chmod +x /var/lib/asterisk/agi-bin/audiosocket_concierge_server.py || true;
             mkdir -p /var/log/asterisk/cdr-csv /var/log/asterisk/ai/calls;
             chown -R asterisk:asterisk /var/lib/asterisk/sounds/ai /var/log/asterisk/ai /var/log/asterisk/cdr-csv || true;
             python3 /var/lib/asterisk/agi-bin/audiosocket_translation_server.py >> /var/log/asterisk/ai/audiosocket_translation_server.log 2>&1 &
             python3 /var/lib/asterisk/agi-bin/audiosocket_concierge_server.py >> /var/log/asterisk/ai/audiosocket_concierge_server.log 2>&1 &
             exec su -s /bin/sh asterisk -c 'asterisk -f -vvv'"

  freeradius:
    image: freeradius/freeradius-server:latest
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius:/config-src:ro
    depends_on:
      - api
    command: >
      sh -c "cp -a /config-src/. /etc/freeradius/ &&
             chmod -R go-w /etc/freeradius &&
             exec freeradius -f"
    restart: unless-stopped

volumes:
  asterisk_sounds_ai:
